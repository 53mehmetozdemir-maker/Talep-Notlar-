<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ERP PRO</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="loginBox" class="card">
  <input id="luser" placeholder="Email">
  <input id="lpass" type="password" placeholder="Şifre">
  <button onclick="login()">Giriş</button>
</div>

<div id="panel">

<nav>
  <button onclick="show('list')">Liste</button>
  <button onclick="show('new')">Ekle</button>
  <button onclick="show('admin')">Admin</button>
  <button onclick="logout()">Çıkış</button>
</nav>

<div id="list" class="section active">
  <table>
    <tbody id="tb"></tbody>
  </table>
</div>

<div id="new" class="section">
  <input id="no">
  <input id="date">
  <input id="dept">
  <input id="desc">
  <button onclick="add()">Kaydet</button>
</div>

<div id="admin" class="section">
  <div id="userList"></div>
</div>

<div>
  <h3>Stats</h3>
  <p id="totalRecords"></p>
  <p id="totalUsers"></p>
</div>

</div>

<script type="module" src="./auth.js"></script>
<script type="module" src="./records.js"></script>
<script type="module" src="./dashboard.js"></script>
<script type="module" src="./admin.js"></script>

</body>
</html>
