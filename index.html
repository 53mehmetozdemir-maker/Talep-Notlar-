<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ERP PRO FINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h2>Giriş</h2>
  <input id="luser" placeholder="Email">
  <input id="lpass" type="password" placeholder="Şifre">
  <button onclick="login()">Giriş</button>
</div>

<!-- PANEL -->
<div id="panel" style="display:none">

<nav>
  <button onclick="show('list')">📋 Liste</button>
  <button onclick="show('new')">➕ Ekle</button>
  <button onclick="show('admin')">👑 Admin</button>
  <button onclick="logout()" style="background:red">Çıkış</button>
</nav>

<div class="container">

<!-- LIST -->
<div id="list" class="section active">
  <div class="card">
    <table>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>

<!-- ADD -->
<div id="new" class="section">
  <div class="card">
    <input id="no" placeholder="No">
    <input id="date" type="date">
    <input id="dept" placeholder="Dept">
    <input id="desc" placeholder="Açıklama">
    <button onclick="add()">Kaydet</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="section">
  <div class="card">
    <div id="userList"></div>
  </div>
</div>

<!-- STATS -->
<div class="card">
  <p>📊 Kayıt: <span id="totalRecords">0</span></p>
  <p>👥 Kullanıcı: <span id="totalUsers">0</span></p>
</div>

</div>
</div>

<script type="module" src="./auth.js"></script>
<script type="module" src="./records.js"></script>
<script type="module" src="./dashboard.js"></script>
<script type="module" src="./admin.js"></script>

<script>
window.show = function(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="admin" && window.loadUsers) loadUsers();
}
</script>

</body>
</html>
