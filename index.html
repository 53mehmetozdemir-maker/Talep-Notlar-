<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ERP PANEL PRO V3.0 - Modern Interface</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Modern Renk Paleti ve Değişkenler */
        :root {
            --bg-main: #f0f2f5;
            --bg-card: #ffffff;
            --primary: #2563eb; /* Modern Mavi */
            --primary-hover: #1d4ed8;
            --danger: #ef4444; /* Soft Kırmızı */
            --danger-hover: #dc2626;
            --warning: #f59e0b; /* Tatlı Turuncu */
            --dark: #111827;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        /* Temel Ayarlar */
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Daha modern font */
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* Modern Navigasyon */
        nav {
            display: flex;
            gap: 12px;
            padding: 15px 20px;
            background-color: var(--dark);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-md);
        }

        nav button {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: var(--radius-sm);
            background-color: #374151; /* Darker gray */
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        nav button:hover {
            background-color: #4b5563;
        }

        nav button.active {
            background-color: var(--primary);
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }

        /* Konteyner ve Kartlar */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 30px 20px;
        }

        .card {
            background-color: var(--bg-card);
            padding: 25px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        h2, h3 {
            margin-top: 0;
            font-weight: 700;
            color: var(--dark);
        }

        h3 {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        /* Modern Form Elemanları */
        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            font-size: 14px;
            color: var(--dark);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin-top: 6px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background-color: #f9fafb;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: #fff;
        }

        textarea { resize: vertical; }

        .error-field {
            border: 2px solid var(--danger) !important;
            background-color: #fff1f2 !important;
        }
        
        /* Gelişmiş Tablo Tasarımı */
        .table-container {
            overflow-x: auto;
            background-color: var(--bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        th {
            background-color: #f9fafb;
            padding: 18px 15px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
            color: var(--dark);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #fcfcfd; }
        
        /* Modern Butonlar */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            margin-right: 5px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn:active { transform: translateY(1px); }

        .edit { background-color: var(--warning); color: #fff; }
        .edit:hover { background-color: #e18e0a; }

        .del { background-color: var(--danger); color: #fff; }
        .del:hover { background-color: var(--danger-hover); }

        .action {
            background-color: var(--primary);
            color: #fff;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            margin-top: 25px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 700;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .action:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        /* Login Ekranı Özel */
        #loginBox {
            max-width: 450px;
            margin: 100px auto;
            text-align: center;
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        #loginBox h2 { font-size: 28px; margin-bottom: 30px; }
        
        /* Admin Grid & Listeler */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        
        #deptList, #userList {
            margin-top: 15px;
            padding: 0;
            list-style: none;
        }

        #deptList li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f9fafb;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }

        #userList > div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            background-color: #f9fafb;
            padding: 12px 15px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }
        
        /* Filtre Barı */
        .filter-bar {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-bar div { flex: 1; min-width: 200px; }
        .filter-bar label { margin-top: 0; }

        /* Bölüm Yönetimi */
        .section { display: none; }
        .active-section { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobil Uyumluluk (Responsive) */
        @media (max-width: 768px) {
            nav { flex-wrap: wrap; padding: 10px; gap: 8px; }
            nav button { flex: 1 1 45%; font-size: 13px; padding: 10px; }
            .admin-grid { grid-template-columns: 1fr; }
            .container { padding: 15px; }
            .card { padding: 15px; }
            th, td { padding: 10px; font-size: 13px; }
            .action { padding: 12px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div id="loginBox" class="card">
    <h2 style="color:var(--primary)">🌐 ERP PANEL PRO</h2>
    <p style="color: var(--text-muted); margin-bottom: 20px;">Lütfen devam etmek için giriş yapın.</p>
    <input id="luser" placeholder="E-posta Adresiniz">
    <input id="lpass" type="password" placeholder="Şifreniz">
    <button class="action" onclick="login()">Sisteme Güvenli Giriş</button>
</div>

<div id="panel" style="display:none;">
    <nav id="mainNav">
        <button id="nav-list" class="active" onclick="show('list')">📋 Talepler</button>
        <button id="nav-new" onclick="show('new')">➕ Yeni Talep</button>
        <button id="nav-admin" style="display:none;" onclick="show('admin')">👑 Yönetim</button>
        <button onclick="logout()" style="background:var(--danger); margin-left: auto; flex: 0 1 auto;">Çıkış</button>
    </nav>

    <div class="container">
        
        <div id="list" class="section active-section">
            <div class="card">
                <h3>🔍 Kayıt Filtreleme</h3>
                <div class="filter-bar">
                    <div>
                        <label>Anahtar Kelime (No/Açıklama)</label>
                        <input id="search" placeholder="Ara..." oninput="render()">
                    </div>
                    <div>
                        <label>Başlangıç Tarihi</label>
                        <input type="date" id="filterStart">
                    </div>
                    <div>
                        <label>Bitiş Tarihi</label>
                        <input type="date" id="filterEnd">
                    </div>
                    <button class="btn" style="background:var(--primary); color:white; height:45px; padding:0 20px; margin:0;" onclick="render()">Filtrele</button>
                </div>
            </div>

            <div class="table-container card" style="padding:0;">
                <table>
                    <thead>
                        <tr>
                            <th>Talep No</th><th>Tarih</th><th>Departman</th><th>Açıklama</th><th>Oluşturan</th><th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="tb">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="new" class="section">
            <div class="card" style="max-width: 700px; margin: auto;">
                <h3 id="formTitle">🛠️ Yeni Talep Oluştur</h3>
                <input id="docId" type="hidden">
                
                <div class="admin-grid" style="gap: 10px;">
                    <div>
                        <label>Talep Numarası</label>
                        <input id="no" placeholder="Örn: 1234">
                    </div>
                    <div>
                        <label>Tarih</label>
                        <input id="date" type="date">
                    </div>
                </div>
                
                <label>İlgili Departman</label>
                <select id="deptSelect"></select>
                
                <label>Talep Açıklaması</label>
                <textarea id="desc" rows="6" placeholder="Talep detaylarını buraya detaylıca yazınız..."></textarea>
                
                <div style="display:flex; gap:10px; margin-top:20px;">
                    <button class="action" id="saveBtn" style="margin-top:0;" onclick="saveRecord()">Kayıt İşlemini Tamamla</button>
                    <button class="btn" style="background:#f3f4f6; color:var(--dark); margin:0; width:auto; padding:0 25px; border-radius:var(--radius-md);" onclick="show('list')">İptal</button>
                </div>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="admin-grid">
                <div class="card">
                    <h3>🏢 Departman Yönetimi</h3>
                    <div style="display:flex; gap:10px;">
                        <input id="newDeptName" placeholder="Yeni Departman Adı" style="margin-top:0;">
                        <button class="btn" style="background:var(--primary); color:white; margin:0; padding:0 20px;" onclick="addDept()">Ekle</button>
                    </div>
                    <ul id="deptList">
                        </ul>
                </div>

                <div class="card">
                    <h3>👤 Yeni Kullanıcı Oluştur</h3>
                    <div class="admin-grid" style="grid-template-columns: 1fr; gap: 0;">
                        <div>
                            <label>E-posta Adresi</label>
                            <input id="newEmail" placeholder="ornek@mail.com">
                        </div>
                        <div>
                            <label>Şifre</label>
                            <input id="newPass" type="password" placeholder="En az 6 Karakter">
                        </div>
                        <div>
                            <label>Yetki Seviyesi</label>
                            <select id="newRole">
                                <option value="gözlemci">Gözlemci (Sadece İzler)</option>
                                <option value="standart">Standart Kullanıcı</option>
                                <option value="admin">Sistem Yöneticisi</option>
                            </select>
                        </div>
                    </div>
                    <button class="action" onclick="createNewUser()">Hesabı Oluştur ve Kaydet</button>
                </div>

                <div class="card" style="grid-column: span 2;">
                    <h3>📊 Sistem Bilgileri & Kullanıcı Yetkileri</h3>
                    <div style="display:flex; gap:30px; margin-bottom:20px; background:#f9fafb; padding:15px; border-radius:var(--radius-sm); border: 1px solid var(--border-color);">
                        <p style="margin:0;">Toplam Talep: <b id="totalRecords" style="color:var(--primary); font-size:18px;">0</b></p>
                        <p style="margin:0;">Aktif Kullanıcı: <b id="totalUsers" style="color:var(--primary); font-size:18px;">0</b></p>
                    </div>
                    <div id="userList">
                        </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // --- FIREBASE IMPORTS (Mevcut yapı korunarak Persistence eklendi) ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // --- FIREBASE CONFIG (Senin Config'in) ---
    const firebaseConfig = {
        apiKey: "AIzaSyAuSzUO0Ru9DP_ffGJLE7eNGjFJn3KLQ68",
        authDomain: "talep-notlari.firebaseapp.com",
        projectId: "talep-notlari"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Global Değişkenler
    let currentUser = null;
    let currentRole = "gözlemci";
    let allRecords = [];
    let recordsUnsub, deptsUnsub, usersUnsub;

    // --- AUTH TAKİBİ (Hatırlama Özellikli) ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const userDoc = await getDoc(doc(db, "users", user.uid));
            currentRole = userDoc.exists() ? userDoc.data().role : "gözlemci";
            
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("panel").style.display = "block";
            // Admin butonu kontrolü
            document.getElementById("nav-admin").style.display = currentRole === "admin" ? "block" : "none";
            
            initData();
        } else {
            // Çıkışta dinleyicileri temizle
            if (recordsUnsub) recordsUnsub();
            if (deptsUnsub) deptsUnsub();
            if (usersUnsub) usersUnsub();
            document.getElementById("loginBox").style.display = "block";
            document.getElementById("panel").style.display = "none";
            currentUser = null;
        }
    });

    // --- GİRİŞ FONKSİYONU (Lokal Hatırlama) ---
    window.login = () => {
        const email = document.getElementById("luser").value;
        const pass = document.getElementById("lpass").value;

        if(!email || !pass) return alert("Lütfen alanları doldurun.");

        // browserLocalPersistence: Tarayıcı kapansa da hatırlar
        setPersistence(auth, browserLocalPersistence)
            .then(() => {
                return signInWithEmailAndPassword(auth, email, pass);
            })
            .catch(e => alert("Giriş Başarısız: " + e.message));
    };

    // --- VERİ BAŞLATMA & ANLIK DİNLEME ---
    function initData() {
        if (recordsUnsub) recordsUnsub();
        // Talepleri Dinle
        recordsUnsub = onSnapshot(collection(db, "records"), (snap) => {
            allRecords = [];
            snap.forEach(d => allRecords.push({ id: d.id, ...d.data() }));
            render();
            document.getElementById("totalRecords").innerText = allRecords.length;
        });

        if (deptsUnsub) deptsUnsub();
        // Departmanları Dinle
        deptsUnsub = onSnapshot(collection(db, "departments"), (snap) => {
            let opts = '<option value="">Departman Seçiniz...</option>';
            let list = '';
            snap.forEach(d => {
                const n = d.data().name;
                opts += `<option value="${n}">${n}</option>`;
                list += `<li><span>${n}</span> <button class="del" style="padding:4px 8px; margin:0;" onclick="deleteDept('${d.id}')">✖</button></li>`;
            });
            document.getElementById("deptSelect").innerHTML = opts;
            document.getElementById("deptList").innerHTML = list;
        });

        if(currentRole === "admin") {
            if (usersUnsub) usersUnsub();
            // Kullanıcıları Dinle (Sadece Admin)
            usersUnsub = onSnapshot(collection(db, "users"), (snap) => {
                let html = '';
                snap.forEach(u => {
                    const d = u.data();
                    html += `<div>
                        <span><b>${d.email}</b></span>
                        <select onchange="changeRole('${u.id}', this.value)" style="width:auto; padding:5px; margin:0; font-size:13px;">
                            <option value="gözlemci" ${d.role==='gözlemci'?'selected':''}>Gözlemci</option>
                            <option value="standart" ${d.role==='standart'?'selected':''}>Standart</option>
                            <option value="admin" ${d.role==='admin'?'selected':''}>Admin</option>
                        </select>
                    </div>`;
                });
                document.getElementById("userList").innerHTML = html;
                document.getElementById("totalUsers").innerText = snap.size;
            });
        }
    }

    // --- KAYIT KAYDETME / GÜNCELLEME ---
    window.saveRecord = async function() {
        if (currentRole === "gözlemci") return alert("Kayıt yetkiniz yok!");
        
        const ids = ["no", "date", "deptSelect", "desc"];
        let error = false;
        ids.forEach(id => {
            const el = document.getElementById(id);
            if(!el.value) { el.classList.add("error-field"); error = true; }
            else { el.classList.remove("error-field"); }
        });

        if(error) return alert("Kırmızı alanları doldurun!");

        const docId = document.getElementById("docId").value;
        const talepNo = document.getElementById("no").value;

        // Mükerrer kontrolü (Yeni kayıtta)
        if(!docId) {
            const varMi = allRecords.find(r => String(r.no) === String(talepNo));
            if(varMi) {
                document.getElementById("no").classList.add("error-field");
                return alert("Bu talep numarası zaten mevcut!");
            }
        }

        const data = {
            no: talepNo,
            date: document.getElementById("date").value,
            dept: document.getElementById("deptSelect").value,
            desc: document.getElementById("desc").value,
            user: currentUser.email,
            updatedAt: new Date()
        };

        try {
            if (docId) {
                await updateDoc(doc(db, "records", docId), data);
            } else {
                await addDoc(collection(db, "records"), { ...data, createdAt: new Date() });
            }
            show('list');
        } catch(e) { alert("Hata: " + e.message); }
    };

    // --- TABLOYU EKRENA BASMA (Filtrelemeli) ---
    window.render = function() {
        const s = document.getElementById("search").value.toLowerCase();
        const start = document.getElementById("filterStart").value;
        const end = document.getElementById("filterEnd").value;
        
        const filtered = allRecords.filter(r => {
            const numStr = r.no ? String(r.no) : '';
            const descStr = r.desc ? r.desc.toLowerCase() : '';
            const matchSearch = numStr.includes(s) || descStr.includes(s);
            const matchDate = (!start || r.date >= start) && (!end || r.date <= end);
            return matchSearch && matchDate;
        });

        // Tarihe göre sına (Yeni en üstte)
        filtered.sort((a, b) => b.date.localeCompare(a.date));

        let html = "";
        filtered.forEach(r => {
            html += `<tr>
                <td><b>${r.no}Kanka, ERP panelini "canavar" gibi yapıyoruz demiştik, şimdi sıra geldi "canavar gibi görünmesini" sağlamaya! 

CSS'te **CSS Variables** (Değişkenler) kullanarak modern bir renk paleti ( soft maviler, kırmızılar) ve **Shadow** (Gölge) efektleriyle profesyonel bir **"Kart Tasarımı"** kurdum. Sayfa daha ferah, okunabilir ve Inter fontuyla daha şık oldu.

**Merak etme:** JavaScript kodun, HTML id'lerin ve fonksiyon yapıların **birebir aynı** kaldı, onları birer "iskelet" gibi düşündüm ve sadece üzerlerine modern bir "kıyafet" giydirdim.

İşte projenin yapısı bozulmamış ama baştan aşağı güzelleşmiş tam hali:

```html
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ERP PANEL PRO V3.0 - Modern Interface</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Modern Renk Paleti ve Değişkenler */
        :root {
            --bg-main: #f0f2f5;
            --bg-card: #ffffff;
            --primary: #2563eb; /* Modern Mavi */
            --primary-hover: #1d4ed8;
            --danger: #ef4444; /* Soft Kırmızı */
            --danger-hover: #dc2626;
            --warning: #f59e0b; /* Tatlı Turuncu */
            --dark: #111827;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        /* Temel Ayarlar */
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Daha modern font */
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
        }

        /* Modern Navigasyon */
        nav {
            display: flex;
            gap: 12px;
            padding: 15px 20px;
            background-color: var(--dark);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-md);
        }

        nav button {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: var(--radius-sm);
            background-color: #374151; /* Darker gray */
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        nav button:hover {
            background-color: #4b5563;
        }

        nav button.active {
            background-color: var(--primary);
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.5);
        }

        /* Konteyner ve Kartlar */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 30px 20px;
        }

        .card {
            background-color: var(--bg-card);
            padding: 25px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        h2, h3 {
            margin-top: 0;
            font-weight: 700;
            color: var(--dark);
        }

        h3 {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        /* Modern Form Elemanları */
        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            font-size: 14px;
            color: var(--dark);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            margin-top: 6px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            background-color: #f9fafb;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background-color: #fff;
        }

        textarea { resize: vertical; }

        .error-field {
            border: 2px solid var(--danger) !important;
            background-color: #fff1f2 !important;
        }
        
        /* Gelişmiş Tablo Tasarımı */
        .table-container {
            overflow-x: auto;
            background-color: var(--bg-card);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        th {
            background-color: #f9fafb;
            padding: 18px 15px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
            color: var(--dark);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #fcfcfd; }
        
        /* Modern Butonlar */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            margin-right: 5px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn:active { transform: translateY(1px); }

        .edit { background-color: var(--warning); color: #fff; }
        .edit:hover { background-color: #e18e0a; }

        .del { background-color: var(--danger); color: #fff; }
        .del:hover { background-color: var(--danger-hover); }

        .action {
            background-color: var(--primary);
            color: #fff;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            margin-top: 25px;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 700;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .action:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        /* Login Ekranı Özel */
        #loginBox {
            max-width: 450px;
            margin: 100px auto;
            text-align: center;
            padding: 40px;
            box-shadow: var(--shadow-lg);
        }

        #loginBox h2 { font-size: 28px; margin-bottom: 30px; }
        
        /* Admin Grid & Listeler */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        
        #deptList, #userList {
            margin-top: 15px;
            padding: 0;
            list-style: none;
        }

        #deptList li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f9fafb;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }

        #userList > div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            background-color: #f9fafb;
            padding: 12px 15px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
        }
        
        /* Filtre Barı */
        .filter-bar {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-bar div { flex: 1; min-width: 200px; }
        .filter-bar label { margin-top: 0; }

        /* Bölüm Yönetimi */
        .section { display: none; }
        .active-section { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobil Uyumluluk (Responsive) */
        @media (max-width: 768px) {
            nav { flex-wrap: wrap; padding: 10px; gap: 8px; }
            nav button { flex: 1 1 45%; font-size: 13px; padding: 10px; }
            .admin-grid { grid-template-columns: 1fr; }
            .container { padding: 15px; }
            .card { padding: 15px; }
            th, td { padding: 10px; font-size: 13px; }
            .action { padding: 12px; font-size: 15px; }
        }
    </style>
</head>
