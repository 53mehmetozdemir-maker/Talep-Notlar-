<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Talep Notları Panel - V3.0 Excel Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-color: #6366f1; --bg-color: #f3f4f6; --card-bg: #ffffff;
            --text-dark: #111827; --text-muted: #6b7280; --danger: #ef4444;
            --success: #10b981; --radius: 12px; --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-dark); }
        nav { background: #fff; padding: 1rem 2rem; display: flex; gap: 12px; align-items: center; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 100; }
        .nav-brand { font-weight: 800; color: var(--primary-color); margin-right: auto; font-size: 1.2rem; }
        nav button { padding: 10px 16px; border: none; border-radius: 8px; background: #f3f4f6; cursor: pointer; font-weight: 500; transition: 0.2s; }
        nav button.active { background: var(--primary-color); color: white; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; }
        label { display: block; font-size: 0.875rem; font-weight: 600; margin-top: 10px; color: var(--text-muted); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; outline: none; }
        .action { background: var(--primary-color); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .excel-btn { background: var(--success); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; height: 42px; display: flex; align-items: center; gap: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9fafb; padding: 15px; text-align: left; border-bottom: 2px solid #edf2f7; font-size: 13px; color: var(--text-muted); }
        td { padding: 15px; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
        .btn { padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .edit-btn { background: #fef3c7; color: #92400e; }
        .del-btn { background: #fee2e2; color: #991b1b; margin-left: 5px; }
        .section { display: none; }
        .active-section { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .time-badge { background: #e0e7ff; color: #4338ca; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 5px; }
        #userModal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="userModal">
    <div class="card" style="width: 400px;">
        <h3>Kullanıcı Düzenle</h3>
        <input id="editUid" type="hidden">
        <label>E-posta</label><input id="editEmail">
        <label>Yetki</label>
        <select id="editRole"><option value="gözlemci">Gözlemci</option><option value="standart">Standart</option><option value="admin">Admin</option></select>
        <button class="action" onclick="updateUser()">Kaydet</button>
        <button class="btn" style="width:100%; margin-top:10px;" onclick="closeModal()">İptal</button>
    </div>
</div>

<div id="loginBox" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
    <h1 style="color:var(--primary-color);">Talep Notları</h1>
    <input id="luser" placeholder="E-posta">
    <input id="lpass" type="password" placeholder="Şifre">
    <button class="action" onclick="login()">Giriş Yap</button>
</div>

<div id="panel" style="display:none;">
    <nav>
        <div class="nav-brand">Talep Notları</div>
        <button id="nav-list" class="active" onclick="show('list')">📋 Talepler</button>
        <button id="nav-new" onclick="show('new')">➕ Yeni Talep</button>
        <button id="nav-admin" style="display:none;" onclick="show('admin')">👑 Yönetim</button>
        <button onclick="logout()" style="background:#fee2e2; color:#ef4444;">Çıkış</button>
    </nav>

    <div class="container">
        <div id="list" class="section active-section">
            <div class="card">
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:15px; align-items:flex-end;">
                    <div><label>Arama</label><input id="search" placeholder="No veya açıklama..." oninput="render()"></div>
                    <div><label>Bölüm</label><select id="filterDept" onchange="render()"><option value="">Tüm Bölümler</option></select></div>
                    <div><label>Başlangıç</label><input type="date" id="filterStart" onchange="render()"></div>
                    <div><label>Bitiş</label><input type="date" id="filterEnd" onchange="render()"></div>
                    <button class="excel-btn" onclick="exportToExcel()">📊 Excel İndir</button>
                </div>
            </div>
            <div class="card" style="padding:0; overflow-x:auto;">
                <table id="talepTable">
                    <thead><tr><th>No</th><th>Tarih / Saat</th><th>Bölüm</th><th>Açıklama</th><th>Kullanıcı</th><th>İşlem</th></tr></thead>
                    <tbody id="tb"></tbody>
                </table>
            </div>
        </div>

        <div id="new" class="section">
            <div class="card" style="max-width:600px; margin:auto;">
                <h3 id="formTitle">Talep Detayı</h3>
                <input id="docId" type="hidden">
                <label>Talep No</label><input id="no">
                <label>Tarih</label><input id="date" type="date">
                <label>Departman</label><select id="deptSelect"></select>
                <label>Açıklama</label><textarea id="desc" rows="5"></textarea>
                <button class="action" onclick="saveRecord()">Sisteme Kaydet</button>
            </div>
        </div>

        <div id="admin" class="section">
            <div class="admin-grid" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div class="card">
                    <h3>🏢 Departmanlar</h3>
                    <div style="display:flex; gap:5px;"><input id="newDeptName" placeholder="Ad"><button class="btn" style="background:var(--primary-color); color:white; margin-top:6px;" onclick="addDept()">Ekle</button></div>
                    <ul id="deptList" style="list-style:none; padding:0; margin-top:10px;"></ul>
                </div>
                <div class="card">
                    <h3>👤 Kullanıcı Tanımla</h3>
                    <input id="newEmail" placeholder="E-posta"><input id="newPass" type="password" placeholder="Şifre">
                    <select id="newRole"><option value="gözlemci">Gözlemci</option><option value="standart">Standart</option><option value="admin">Admin</option></select>
                    <button class="action" onclick="createNewUser()">Kaydet</button>
                </div>
                <div class="card" style="grid-column: span 2;">
                    <h3>📊 Kullanıcı Yönetimi</h3>
                    <table>
                        <thead><tr><th>E-posta</th><th>Rol</th><th>İşlem</th></tr></thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyAuSzUO0Ru9DP_ffGJLE7eNGjFJn3KLQ68", authDomain: "talep-notlari.firebaseapp.com", projectId: "talep-notlari" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app);

    let currentUser = null; let currentRole = "gözlemci"; let allRecords = []; let filteredDataForExcel = [];

    const getToday = () => new Date().toISOString().split('T')[0];
    const getTimeNow = () => new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const userDoc = await getDoc(doc(db, "users", user.uid));
            currentRole = userDoc.exists() ? userDoc.data().role : "gözlemci";
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("panel").style.display = "block";
            document.getElementById("nav-admin").style.display = currentRole === "admin" ? "block" : "none";
            document.getElementById("date").value = getToday();
            document.getElementById("filterStart").value = getToday();
            document.getElementById("filterEnd").value = getToday();
            initData();
        } else {
            document.getElementById("loginBox").style.display = "block";
            document.getElementById("panel").style.display = "none";
        }
    });

    window.login = () => {
        const e = document.getElementById("luser").value, p = document.getElementById("lpass").value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
    };

    function initData() {
        onSnapshot(collection(db, "records"), snap => {
            allRecords = []; snap.forEach(d => allRecords.push({ id: d.id, ...d.data() })); render();
        });
        onSnapshot(collection(db, "departments"), snap => {
            let opts = '', list = '', fOpts = '<option value="">Tüm Bölümler</option>';
            snap.forEach(d => {
                opts += `<option value="${d.data().name}">${d.data().name}</option>`;
                fOpts += `<option value="${d.data().name}">${d.data().name}</option>`;
                list += `<li style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;">${d.data().name} <div><button class="btn del-btn" onclick="deleteDept('${d.id}')">✖</button></div></li>`;
            });
            document.getElementById("deptSelect").innerHTML = opts;
            document.getElementById("filterDept").innerHTML = fOpts;
            document.getElementById("deptList").innerHTML = list;
        });
        if(currentRole === "admin") {
            onSnapshot(collection(db, "users"), snap => {
                let html = '';
                snap.forEach(u => {
                    html += `<tr><td>${u.data().email}</td><td><b>${u.data().role}</b></td><td><button class="btn edit-btn" onclick="openUserModal('${u.id}','${u.data().email}','${u.data().role}')">✏️</button> <button class="btn del-btn" onclick="deleteUser('${u.id}')">🗑️</button></td></tr>`;
                });
                document.getElementById("userTableBody").innerHTML = html;
            });
        }
    }

    window.render = () => {
        const s = document.getElementById("search").value.toLowerCase();
        const start = document.getElementById("filterStart").value;
        const end = document.getElementById("filterEnd").value;
        const fDept = document.getElementById("filterDept").value;
        
        filteredDataForExcel = allRecords.filter(r => {
            const matchSearch = String(r.no).includes(s) || r.desc.toLowerCase().includes(s);
            const matchDate = (!start || r.date >= start) && (!end || r.date <= end);
            const matchDept = !fDept || r.dept === fDept;
            return matchSearch && matchDate && matchDept;
        }).sort((a,b) => (b.date + (b.time || "")).localeCompare(a.date + (a.time || "")));

        let html = "";
        filteredDataForExcel.forEach(r => {
            html += `<tr><td><b>${r.no}</b></td><td>${r.date} <span class="time-badge">${r.time || ''}</span></td><td>${r.dept}</td><td>${r.desc}</td><td>${r.user}</td>
            <td><button class="btn edit-btn" onclick="editRecord('${r.id}')">✏️</button>${currentRole === 'admin' ? `<button class="btn del-btn" onclick="deleteRecord('${r.id}')">🗑️</button>` : ''}</td></tr>`;
        });
        document.getElementById("tb").innerHTML = html;
    };

    // --- EXCEL EXPORT FONKSİYONU ---
    window.exportToExcel = () => {
        if(filteredDataForExcel.length === 0) return alert("İndirilecek veri bulunamadı!");
        
        // Veriyi Excel formatına hazırla (İşlem butonunu dahil etmiyoruz)
        const excelRows = filteredDataForExcel.map(r => ({
            "Talep No": r.no,
            "Tarih": r.date,
            "Saat": r.time || "",
            "Bölüm": r.dept,
            "Açıklama": r.desc,
            "Ekleyen": r.user
        }));

        const worksheet = XLSX.utils.json_to_sheet(excelRows);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Talepler");

        // Dosyayı indir
        const fileName = `Talep_Raporu_${getToday()}.xlsx`;
        XLSX.writeFile(workbook, fileName);
    };

    // Diğer temel fonksiyonlar
    window.deleteRecord = async (id) => confirm("Kaydı Sil?") && await deleteDoc(doc(db, "records", id));
    window.saveRecord = async () => {
        const data = { no: document.getElementById("no").value, date: document.getElementById("date").value, time: getTimeNow(), dept: document.getElementById("deptSelect").value, desc: document.getElementById("desc").value, user: currentUser.email };
        const id = document.getElementById("docId").value;
        id ? await updateDoc(doc(db, "records", id), data) : await addDoc(collection(db, "records"), data);
        document.getElementById("docId").value = ""; show('list');
    };
    window.editRecord = (id) => {
        const r = allRecords.find(x => x.id === id);
        document.getElementById("docId").value = r.id; document.getElementById("no").value = r.no;
        document.getElementById("date").value = r.date; document.getElementById("deptSelect").value = r.dept;
        document.getElementById("desc").value = r.desc; show('new');
    };
    window.show = (id) => {
        document.querySelectorAll(".section").forEach(s => s.classList.remove("active-section"));
        document.getElementById(id).classList.add("active-section");
        document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
        if(document.getElementById('nav-'+id)) document.getElementById('nav-'+id).classList.add('active');
    };
    window.addDept = async () => { const n = document.getElementById("newDeptName").value; if(n) await addDoc(collection(db, "departments"), {name: n}); document.getElementById("newDeptName").value=""; };
    window.deleteDept = async (id) => confirm("Sil?") && await deleteDoc(doc(db, "departments", id));
    window.createNewUser = async () => {
        const e = document.getElementById("newEmail").value, p = document.getElementById("newPass").value, r = document.getElementById("newRole").value;
        const res = await createUserWithEmailAndPassword(auth, e, p);
        await setDoc(doc(db, "users", res.user.uid), { email: e, role: r }); alert("Kullanıcı Eklendi");
    };
    window.deleteUser = async (id) => confirm("Kullanıcıyı Sil?") && await deleteDoc(doc(db, "users", id));
    window.logout = () => signOut(auth);
    window.openUserModal = (uid, email, role) => {
        document.getElementById("editUid").value = uid; document.getElementById("editEmail").value = email;
        document.getElementById("editRole").value = role; document.getElementById("userModal").style.display = "flex";
    };
    window.closeModal = () => document.getElementById("userModal").style.display = "none";
    window.updateUser = async () => {
        await updateDoc(doc(db, "users", document.getElementById("editUid").value), { email: document.getElementById("editEmail").value, role: document.getElementById("editRole").value });
        closeModal();
    };
</script>
</body>
</html>
