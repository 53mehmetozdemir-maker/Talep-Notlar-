<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ERP V1 STABLE</title>

<style>
body{font-family:system-ui;margin:0;background:#f3f4f6}
.card{background:white;padding:15px;margin:10px;border-radius:10px}
nav{display:flex;gap:10px;padding:10px;background:#111827}
nav button{flex:1;padding:10px;border:0;border-radius:8px;color:white;background:#374151}
nav button:hover{background:#2563eb}
.hidden{display:none}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #ddd}
input,select{padding:8px;margin:5px;width:100%}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="card">
  <h3>Giriş</h3>
  <input id="email" placeholder="email">
  <input id="pass" type="password" placeholder="şifre">
  <button onclick="login()">Giriş</button>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">

<nav>
  <button onclick="show('list')">Liste</button>
  <button onclick="show('add')">Ekle</button>
  <button onclick="show('admin')">Admin</button>
  <button onclick="logout()">Çıkış</button>
</nav>

<div id="list" class="card">
  <input placeholder="Ara" oninput="search=this.value;render()">
  <input type="date" onchange="start=this.value;render()">
  <input type="date" onchange="end=this.value;render()">

  <table>
    <tbody id="tb"></tbody>
  </table>

  <h4 id="count"></h4>
</div>

<div id="add" class="card hidden">
  <input id="no" placeholder="No">
  <input id="date" type="date">
  <input id="dept" placeholder="Dept">
  <input id="desc" placeholder="Açıklama">
  <button onclick="add()">Kaydet</button>
</div>

<div id="admin" class="card hidden">
  <h3>Kullanıcı Rol</h3>
  <input id="uemail" placeholder="email">
  <select id="urole">
    <option>viewer</option>
    <option>standard</option>
    <option>admin</option>
  </select>
  <button onclick="setRole()">Güncelle</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore, collection, addDoc, getDocs,
deleteDoc, doc, updateDoc, setDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth, signInWithEmailAndPassword,
signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAuSzUO0Ru9DP_ffGJLE7eNGjFJn3KLQ68",
authDomain: "talep-notlari.firebaseapp.com",
projectId: "talep-notlari"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user=null;
let role="viewer";
let search="",start="",end="";

/* LOGIN */
window.login = async () => {
await signInWithEmailAndPassword(auth,email.value,pass.value);
};

window.logout = () => signOut(auth);

/* ROLE */
async function loadRole(u){
const ref = doc(db,"users",u.uid);
const s = await getDoc(ref);

if(!s.exists()){
await setDoc(ref,{email:u.email,role:"viewer"});
role="viewer";
}else role=s.data().role;
}

/* AUTH */
onAuthStateChanged(auth, async (u)=>{
if(u){
user=u;
await loadRole(u);

loginBox.classList.add("hidden");
panel.classList.remove("hidden");

render();
}else{
loginBox.classList.remove("hidden");
panel.classList.add("hidden");
}
});

/* ADD */
window.add = async () => {

await addDoc(collection(db,"records"),{
no:no.value,
date:date.value,
dept:dept.value,
desc:desc.value,
user:user.email
});

render();
};

/* DELETE */
window.del = async (id)=>{
await deleteDoc(doc(db,"records",id));
render();
};

/* EDIT */
window.edit = async (id)=>{
let v=prompt("Yeni açıklama");
if(!v)return;
await updateDoc(doc(db,"records",id),{desc:v});
render();
};

/* RENDER */
window.render = async () => {

const tb=document.getElementById("tb");
tb.innerHTML="";

let snap=await getDocs(collection(db,"records"));

let arr=[];
snap.forEach(d=>arr.push({id:d.id,...d.data()}));

arr=arr.filter(x=>{
let s=(x.no+x.dept+x.desc).toLowerCase().includes(search.toLowerCase());
let d=!start||!end?true:(x.date>=start&&x.date<=end);
return s&&d;
});

arr.forEach(x=>{
tb.innerHTML+=`
<tr>
<td>${x.no}</td>
<td>${x.date}</td>
<td>${x.dept}</td>
<td>${x.desc}</td>
<td>${x.user}</td>
<td>
<button onclick="edit('${x.id}')">E</button>
<button onclick="del('${x.id}')">S</button>
</td>
</tr>`;
});

count.innerText="Toplam: "+arr.length;
};

/* NAV */
window.show=(id)=>{
document.querySelectorAll(".card").forEach(e=>{
if(e.id && e.id!==id) e.classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
};

</script>

</body>
</html>
